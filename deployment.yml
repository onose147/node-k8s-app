apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodeapp
  namespace: dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nodeapp
  template:
    metadata:
      labels:
        app: nodeapp
    spec:
      containers:
        - name: nodeapp
          image: onose147/node-k8s-app:v1
          ports:
            - containerPort: 8080
          env:
            - name: MONGO_URL
              value: mongodb://root:rootpassword@mongodb.dev.svc.cluster.local:27017
---
apiVersion: v1
kind: Service
metadata:
  name: nodeappsvc
  namespace: dev
spec:
  type: NodePort
  selector:
    app: nodeapp
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080

